server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── App shell + PWA control files — always revalidate ─────────────────────
    # index.html, the service worker and its registration/manifest must NOT be
    # frozen: a new frontend deploy changes the hashed /assets/* filenames, but
    # the browser only discovers them by re-fetching index.html (and the SW its
    # precache manifest). With no Cache-Control, index.html falls to heuristic
    # caching and an already-open tab / installed PWA keeps serving the previous
    # build's shell (old bundle → e.g. the Delete-camera button never appears).
    # Exact-match (`=`) locations outrank the regex asset block below, so sw.js /
    # registerSW.js are excluded from the immutable/1y rule. `always` + repeated
    # security headers are required because a location-level add_header drops the
    # server-level add_header set.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache static assets — hashed /assets/* are content-addressed, safe to freeze.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # The SPA uses a relative API base (`baseUrl: '/api'` in src/app/api.ts), so
    # the browser POSTs same-origin to /api/*. In `npm run dev` Vite's
    # server.proxy forwards these to the backend; the built nginx image must do
    # the same or every request (incl. POST /api/auth/login) falls into the SPA
    # fallback below and nginx answers 405 for non-GET. `backend` is the compose
    # service name; no trailing path on proxy_pass so the full /api/... URI is
    # preserved (backend mounts routers under /api).
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (socket.io) — same backend, with upgrade headers.
    location /socket.io/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Media (HLS/WebRTC) reverse proxy ──────────────────────────────────────
    # MediaMTX is NEVER exposed to the browser directly. Every media request —
    # including each HLS child request (media playlist, init/media segments) and
    # each WHEP sub-request (OPTIONS/POST/PATCH/DELETE) — is authorized by the
    # backend (GET /api/media/authorize). auth_request always issues a GET to the
    # auth endpoint regardless of the original method, and it applies to the whole
    # location, so every method under /media/* is gated.
    #
    # The browser carries auth in the HttpOnly, path-scoped `media_auth` cookie
    # (minted on session start; see media-auth.router.setMediaAuthCookies), NOT in
    # the URL — so multi-file HLS/WHEP child requests are all authorized and no
    # token is ever written to an access log. We forward the ORIGINAL URI and the
    # Cookie to the subrequest; the backend recomputes the session PREFIX from the
    # path (first 4 segments), verifies the cookie's HMAC over that prefix, and
    # confirms it maps to a live session (blocks path-swap to another camera and
    # any traversal/encoded-slash smuggling). `mediamtx` is the compose/media-tier
    # service name; HLS on 8888, WebRTC (WHEP) on 8889.
    location = /_media_auth {
        internal;
        proxy_pass http://backend:4000/api/media/authorize;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }
    location /media/hls/ {
        auth_request /_media_auth;
        proxy_pass http://mediamtx:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Media bytes are per-session and short-lived: never let a shared/CDN cache
        # store them, and never leak the media URL as a Referer to a third party.
        add_header Cache-Control "no-store" always;
        add_header Referrer-Policy "no-referrer" always;
    }
    location /media/webrtc/ {
        auth_request /_media_auth;
        proxy_pass http://mediamtx:8889/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-store" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
