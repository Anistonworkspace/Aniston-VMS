# ─────────────────────────────────────────────────────────────────────────────
# Aniston VMS camera simulator.
#
# Spins up a MediaMTX media server plus 6 ffmpeg publishers that loop a
# generated "testsrc2" pattern into it as RTSP, standing in for cam-001..
# cam-006 without any real camera hardware. Intended to be run standalone
# during local dev:
#
#   docker compose -f simulator/docker-compose.sim.yml up -d
#
# ...or merged into the main stack via the optional `mediamtx` service +
# `sim` profile already added to docker-compose.fullstack.yml:
#
#   docker compose -f docker-compose.fullstack.yml --profile sim up -d
#
# (that variant only starts mediamtx itself — the 6 ffmpeg publishers below
# are simulator-only and are not duplicated into the fullstack file).
#
# See simulator/README.md for fault injection and camera onboarding values.
# ─────────────────────────────────────────────────────────────────────────────

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: aniston-sim-mediamtx
    restart: unless-stopped
    ports:
      - '8554:8554' # RTSP
      - '8888:8888' # HLS
      - '8889:8889' # WebRTC
      - '9997:9997' # API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    networks:
      - aniston-sim

  cam-001:
    image: jrottenberg/ffmpeg:4.4-alpine
    container_name: aniston-sim-cam-001
    restart: unless-stopped
    depends_on: [mediamtx]
    entrypoint: ['/bin/sh', '-c']
    command:
      - >
        ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=15
        -f lavfi -i sine=frequency=220:sample_rate=8000
        -pix_fmt yuv420p -c:v libx264 -preset ultrafast -tune zerolatency -g 30
        -b:v 512k -c:a aac -b:a 32k
        -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/cam-001
    networks:
      - aniston-sim

  cam-002:
