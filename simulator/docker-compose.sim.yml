# ─────────────────────────────────────────────────────────────────────────────
# Aniston VMS camera simulator — 6 optional ffmpeg test-pattern publishers.
#
# These loop a generated "testsrc2" pattern into MediaMTX as RTSP, standing in
# for cam-001..cam-006 without any real camera hardware.
#
# They publish INTO the always-on MediaMTX that ships with the main stack
# (service `mediamtx` / container `aniston_vms_mediamtx`, defined in
# docker/docker-compose.fullstack.yml). This file no longer runs its own
# MediaMTX server: a second server competed for host port 8554 with the
# authoritative one and caused "port is already allocated" / split-brain
# conflicts. There is now exactly ONE MediaMTX, and these publishers reach it
# by its `mediamtx` network alias on the shared `docker_default` network.
#
# Prerequisite: the main stack must be up first (it owns MediaMTX + the network):
#
#   docker compose -f docker/docker-compose.fullstack.yml up -d
#   docker compose -f simulator/docker-compose.sim.yml up -d   # add fake cams
#
# The published paths (cam-001..cam-006) are pre-declared in simulator/mediamtx.yml
# (mounted by aniston_vms_mediamtx); the real CAM-007 Live Wall path
# (live/live-sub/CAM-007/…) is unaffected — it is registered dynamically by the
# backend and matches the mediamtx.yml `all_others` wildcard.
#
# See simulator/README.md for fault injection and camera onboarding values.
# ─────────────────────────────────────────────────────────────────────────────

services:
  cam-001:
    image: jrottenberg/ffmpeg:4.4-alpine
    container_name: aniston-sim-cam-001
    restart: unless-stopped
    entrypoint: ['/bin/sh', '-c']
    command:
      - >
        ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=15
        -f lavfi -i sine=frequency=220:sample_rate=8000
        -pix_fmt yuv420p -c:v libx264 -preset ultrafast -tune zerolatency -g 30
        -b:v 512k -c:a aac -b:a 32k
        -f rtsp -rtsp_transport tcp rtsp://mediamtx:8554/cam-001
    networks:
      - vms

  cam-002:
