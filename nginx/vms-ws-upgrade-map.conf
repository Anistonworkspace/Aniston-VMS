# ─────────────────────────────────────────────────────────────────────────────
# WebSocket upgrade map for the VMS vhost.
#
# Maps the Upgrade request header to the correct Connection response value so
# socket.io / WHEP upgrades pass through the reverse proxy, while normal HTTP
# requests keep keepalive (empty Connection).
#
# Install to /etc/nginx/conf.d/ (http context) ONLY IF the host does not already
# define a `$connection_upgrade` map — a second definition is a hard nginx error.
# Grep for the map DEFINITION, not the variable use, so the guard never self-
# matches the vhost's own `Connection $connection_upgrade;` line:
#
#   sudo nginx -T 2>/dev/null | grep -qE 'map\s+\$http_upgrade\s+\$connection_upgrade' \
#     || sudo cp nginx/vms-ws-upgrade-map.conf /etc/nginx/conf.d/vms-ws-upgrade-map.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────
# For non-WebSocket requests the Upgrade header is empty → Connection is left
# empty (NOT "close"), so the `keepalive` upstream pool to the frontend container
# is preserved. WebSocket/WHEP requests still get Connection: upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}
