# ─────────────────────────────────────────────────────────────────────────────
# Aniston VMS — host nginx vhost for vms.anistonav.com
#
# This is the ONLY host-level nginx change for the VMS deploy. It proxies to the
# VMS frontend container, which docker/docker-compose.prod.yml publishes on
# 127.0.0.1:8095. The frontend container's own nginx does the real routing (SPA
# fallback, /api + /socket.io → backend:4000, /media/* → mediamtx with
# auth_request gating), so this host vhost is a single-upstream reverse proxy —
# it never needs to know about the backend or mediamtx.
#
# Install (once, on the server — leaves every other vhost untouched):
#   sudo cp nginx/vms.anistonav.com.conf     /etc/nginx/sites-available/vms.anistonav.com
#   # Install the WS map only if the host has no existing $connection_upgrade map
#   # (grep the DEFINITION, not the variable use, or the guard self-matches):
#   sudo nginx -T 2>/dev/null | grep -qE 'map\s+\$http_upgrade\s+\$connection_upgrade' \
#     || sudo cp nginx/vms-ws-upgrade-map.conf /etc/nginx/conf.d/vms-ws-upgrade-map.conf
#   sudo ln -s /etc/nginx/sites-available/vms.anistonav.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (once): `sudo certbot --nginx -d vms.anistonav.com` — certbot injects the
# 443 server block + HTTP→HTTPS redirect into THIS vhost only. certbot does NOT
# add HSTS, so after it runs, add this to the generated 443 server block:
#   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
# then `sudo nginx -t && sudo systemctl reload nginx`.
# ─────────────────────────────────────────────────────────────────────────────

upstream aniston_vms_frontend {
    server 127.0.0.1:8095;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name vms.anistonav.com;

    # Snapshot / clip imports pass through to the app.
    client_max_body_size 50M;

    # Access/error logs kept separate so they never mix with other sites' logs.
    access_log /var/log/nginx/vms.anistonav.com.access.log;
    error_log  /var/log/nginx/vms.anistonav.com.error.log;

    location / {
        proxy_pass http://aniston_vms_frontend;
        proxy_http_version 1.1;

        # WebSocket upgrade for socket.io (live wall / incident board) and WHEP
        # (WebRTC media). $connection_upgrade is defined by the map in
        # nginx/vms-ws-upgrade-map.conf (or an existing host-wide map).
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;

        proxy_read_timeout  75s;
        proxy_send_timeout  75s;
        proxy_cache_bypass  $http_upgrade;
    }
}
