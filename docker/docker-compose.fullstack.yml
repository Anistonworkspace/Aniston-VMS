version: '3.9'

# Full-stack Docker setup — all 4 services.
# Use this for CI, staging, or testing the production build locally.
# For daily development, use docker-compose.dev.yml instead (faster rebuilds).

services:
  postgres:
    image: postgres:16-alpine
    container_name: aniston_vms_postgres
    restart: unless-stopped
    ports:
      # Host 5432 is taken by an unrelated 'aniston-postgres' container already
      # running on this machine, so publish on 15432 instead. Container-internal
      # port stays 5432 (backend reaches it via the 'postgres' service hostname).
      - '127.0.0.1:15432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aniston_vms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aniston_vms_redis
    restart: unless-stopped
    ports:
      # Host 6379 is taken by an unrelated 'aniston-redis' container already
      # running on this machine, so publish on 16379 instead. Container-internal
      # port stays 6379 (backend reaches it via the 'redis' service hostname).
      - '127.0.0.1:16379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: aniston_vms_backend
    restart: unless-stopped
    ports:
      - '127.0.0.1:4000:4000'
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-devpassword123}@postgres:5432/${POSTGRES_DB:-aniston_vms}
      REDIS_URL: redis://redis:6379
      # Server-side MediaMTX control-API endpoint. The backend must reach the
      # mediamtx service by its compose hostname; the HLS/WebRTC/RTSP stream URLs
      # are intentionally left at their localhost defaults because those are handed
      # to the browser (host-mapped ports). Without this the backend hits its own
      # localhost:9997 and every Live Wall publish/transcode registration fails.
      MEDIAMTX_API_URL: http://mediamtx:9997
      # Run in development mode for this local demo. The stack is designed to run
      # with sim modes ON (HEALTH_SIM_MODE / PLAYBACK_SIM_MODE / ALERT_MOCK_MODE
      # default true) so the Live Wall / health / alerts show data without real
      # cameras. env.ts forbids those sim flags when NODE_ENV=production, so a
      # production value here makes the backend fail config validation and crash.
      NODE_ENV: development
      # Demo/dev stack only: headroom for Playwright E2E runs. The suite drives many
      # data-rich page loads (dashboard/zones/incidents/health) that each fan out to
      # ~10 API calls, so the global limiter (default 100/60s) is the real ceiling —
      # raise it plus the auth limiter here. Production defaults stay strict at
      # 100 general / 50 auth (backend/src/config/env.ts); this override is E2E-only.
      RATE_LIMIT_MAX_REQUESTS: 2000
      AUTH_RATE_LIMIT_MAX_REQUESTS: 200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: aniston_vms_frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:5173:80'
    depends_on:
      backend:
        condition: service_healthy

  # MediaMTX RTSP relay + on-demand transcoder. Core playback infra, NOT an
  # optional sim add-on: the Live Wall pulls each camera's sub-stream through here,
  # and non-browser codecs (e.g. CAM-007's HEVC) are transcoded to H.264 on demand
  # (see backend mediamtx.adapter.ts). It therefore starts with the stack — no
  # 'sim' profile gate. The 6 ffmpeg test-pattern publishers stay optional and live
  # separately in simulator/docker-compose.sim.yml.
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: aniston_vms_mediamtx
    restart: unless-stopped
    ports:
      - '127.0.0.1:8554:8554' # RTSP
      - '127.0.0.1:8888:8888' # HLS
      - '127.0.0.1:8889:8889' # WebRTC
      - '127.0.0.1:9997:9997' # API
    volumes:
      - ../simulator/mediamtx.yml:/mediamtx.yml:ro
    healthcheck:
      # wget ships in the latest-ffmpeg image; the control API answers once the
      # RTSP server is up, so a 200 here means the relay is ready to accept paths.
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9997/v3/config/paths/list']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
