version: '3.9'

# CR-12 — optional observability overlay: Prometheus + Grafana with the two
# provisioned VMS dashboards (docker/grafana/dashboards). Kept OUT of the main
# fullstack compose so the core stack never depends on it.
#
# Start (from repo root):
#   docker compose -f docker/docker-compose.fullstack.yml \
#                  -f docker/docker-compose.observability.yml up -d
#
# Grafana:    http://localhost:3001  (admin / admin — change on first login)
# Prometheus: http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aniston_vms_prometheus
    restart: unless-stopped
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  grafana:
    image: grafana/grafana:11.1.0
    container_name: aniston_vms_grafana
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
